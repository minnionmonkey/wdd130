<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us: Grey Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="The contact page of Grey Water Rafting. Our basic contact info, as well as a form to submit a message request.">
    <meta name="author" content="Zackary Bates">
</head>

<body>
    <header>
        <img src="images/z-raftingbw.png" alt="Grey Water Rafting Logo" width="200">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="information">
            <h1>Grey Water Rafting</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3753.0977451495855!2d-122.90724340160882!3d39.16874566428659!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1780947175947!5m2!1sen!2sus"
              width="600" height="450" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <form>
                <div>
                    <label>Name*</label> <input type="text" name="fullname"
                      placeholder="ex. John Smith" required>
                </div>
                <div>
                    <label>Email*</label> <input type="email" name="email"
                      placeholder="example@example.com" required>
                </div>
                <div class="purpose">
                    <legend>Message Purpose</legend>
                    <div>
                        <input type="radio" id="general" name="purpose" value="general">
                        <label for="general">General Inquiry</label>
                    </div>
                    <div>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>
                    </div>
                    <div>
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        <label for="suggestion">Website Suggestion</label>
                    </div>
                </div>
                <div>
                    <label for="feedback">Message</label>
                    <div>
                        <textarea id="feedback" name="feedback" rows="4"
                          placeholder="Type here"></textarea>
                    </div>
                </div>
                <div>
                    <label><input type="checkbox" id="newsletter" name="newsletter">Please Subscribe
                        me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>
                <p>* indicates a required question</p>
            </form>
        </section>
        <section class="employees">
            <h2>Our Crew!</h2>
            <figure>
                <img src="images/employee1.webp" alt="John Johnson">
                <figcaption>John Johnson</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.webp" alt="Jeff Jefferson">
                <figcaption>Jeff Jefferson</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.webp" alt="Pete Peterson">
                <figcaption>Pete Peterson</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2026 🌊 Grey Water Rafting 🌊 Zackary Bates</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-logo_4406235.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-logo_1384889.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram_408707.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
