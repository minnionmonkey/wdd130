<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form - User Poll Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>WDD 130 | HTML Form - User Poll</header>
    <main>
        <form>
            <div class="form-item column2">
                <label>Full Name: </label> <input type="text" name="fullname" required>
            </div>
            <div class="form-item column2">
                <label>Email: </label> <input type="email" name="useremail" required>
            </div>
            <div class="form-item column2">
                <label for="browser">What is your favorite browser?</label>
                <select name="browser" id="browser">
                    <option value="chrome">Chrome</option>
                    <option value="brave">Brave</option>
                    <option value="edge">Edge</option>
                </select>
            </div>
            <div class="form-item column2">
                <label>Do you have a household
                    pet?</label> <input type="checkbox" id="pet" name="pet">
            </div>
            <div class="form-item">
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>
            </div>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>©2026 | HTML Form - User Poll Activity | Zackary Bates</footer>
</body>

</html>
